name: Build
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    name: ZMK Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v3
        continue-on-error: true
        with:
          path: |
            modules
            tools
            zephyr
            bootloader
            zmk
          key: ${{ runner.os }}-build-${{ hashFiles('**/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-

      # build.yml の抜粋
      - name: ZMK Build Action
        uses: zmkfirmware/zmk-action-build@main
        with:
          board: nice_nano_v2
          shield: my_test_keyboard_left
          config_path: config # configフォルダの中に west.yml や各ファイルがあることを確認
          